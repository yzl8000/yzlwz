<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三角洲行动攻略站 | Delta Force Guide</title>
<style>
/* ============================================================
   CSS Variables & Reset
   ============================================================ */
:root {
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;
  --border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --accent:#f0883e;--accent2:#e85d04;--green:#3fb950;
  --blue:#58a6ff;--red:#f85149;--gold:#d2991d;
  --purple:#a371f7;--teal:#39d353;
  --radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ============================================================
   Nav
   ============================================================ */
.nav{position:sticky;top:0;z-index:1000;background:rgba(13,17,23,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px}
.nav-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--text);cursor:pointer}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:22px;font-size:14px;margin-left:36px}
.nav-links a{color:var(--muted);font-weight:500;cursor:pointer;transition:color 0.2s}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav-search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;color:var(--text);width:200px;outline:none;transition:border-color 0.2s,width 0.2s}
.nav-search:focus{border-color:var(--accent);width:260px}
.nav-search::placeholder{color:var(--muted)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px}

/* ============================================================
   Search Dropdown
   ============================================================ */
.search-wrap{position:relative}
.search-dropdown{display:none;position:absolute;top:100%;right:0;margin-top:8px;width:380px;max-width:90vw;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 16px 40px rgba(0,0,0,0.6);z-index:999;max-height:420px;overflow-y:auto}
.search-dropdown.visible{display:block}
.search-dropdown .sd-header{padding:10px 14px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border)}
.search-dropdown .sd-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid rgba(48,54,61,0.5)}
.search-dropdown .sd-item:hover{background:var(--surface2)}
.search-dropdown .sd-item .sd-icon{font-size:18px;width:32px;text-align:center}
.search-dropdown .sd-item .sd-name{font-size:14px;font-weight:600}
.search-dropdown .sd-item .sd-meta{font-size:11px;color:var(--muted)}
.search-dropdown .sd-empty{padding:20px;text-align:center;color:var(--muted);font-size:13px}
mark{background:rgba(240,136,62,0.3);color:var(--accent);border-radius:2px;padding:0 2px}

/* ============================================================
   Mobile Menu
   ============================================================ */
.mobile-menu{display:none;position:fixed;top:56px;left:0;right:0;bottom:0;background:rgba(13,17,23,0.98);z-index:999;padding:20px 24px;flex-direction:column;gap:4px}
.mobile-menu.visible{display:flex}
.mobile-menu a{display:block;padding:14px 16px;font-size:16px;color:var(--text);border-radius:8px;cursor:pointer;transition:background 0.15s}
.mobile-menu a:hover{background:var(--surface2)}

/* ============================================================
   Page
   ============================================================ */
#app{min-height:calc(100vh - 120px)}
.page{animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ============================================================
   Breadcrumb
   ============================================================ */
.breadcrumb{display:flex;align-items:center;gap:8px;padding:16px 0;font-size:13px;color:var(--muted)}
.breadcrumb a{cursor:pointer;color:var(--muted);transition:color 0.2s}
.breadcrumb a:hover{color:var(--text)}
.breadcrumb .sep{color:#484f58}

/* ============================================================
   Hero
   ============================================================ */
.hero{padding:72px 24px 52px;text-align:center;background:linear-gradient(180deg,rgba(240,136,62,0.08) 0%,transparent 60%),radial-gradient(ellipse at 50% 0%,rgba(240,136,62,0.10) 0%,transparent 60%);border-bottom:1px solid var(--border)}
.hero-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;background:rgba(240,136,62,0.12);color:var(--accent);border:1px solid rgba(240,136,62,0.25);margin-bottom:20px;letter-spacing:1px}
.hero-badge .dot{width:7px;height:7px;border-radius:50%;background:#f0883e;box-shadow:0 0 6px #f0883e}
.hero h1{font-size:44px;font-weight:900;letter-spacing:-1px;margin-bottom:12px}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--muted);font-size:16px;max-width:540px;margin:0 auto 28px}
.hero-search{display:inline-flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;width:420px;max-width:90vw;position:relative}
.hero-search input{flex:1;background:none;border:none;outline:none;font-size:15px;color:var(--text)}
.hero-search input::placeholder{color:var(--muted)}
.hero-search button{background:var(--accent2);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s}
.hero-search button:hover{background:#d4530a}
.hero-search .search-dropdown{left:0;right:auto;width:100%;top:calc(100% + 6px)}
.hero-stats{display:flex;justify-content:center;gap:48px;margin-top:32px}
.stat-item{text-align:center}
.stat-num{font-size:28px;font-weight:800;color:var(--accent)}
.stat-label{font-size:12px;color:var(--muted)}

/* ============================================================
   Section
   ============================================================ */
.section{padding:52px 0}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.section-header h2{font-size:22px;font-weight:700}
.section-header h2 span{color:var(--accent)}
.section-header .more{font-size:13px;color:var(--muted);cursor:pointer;transition:color 0.2s}
.section-header .more:hover{color:var(--text)}

/* ============================================================
   Filter Bar
   ============================================================ */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{font-size:12px;padding:5px 14px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;font-family:inherit}
.filter-btn:hover{border-color:var(--muted);color:var(--text)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}

/* ============================================================
   Cards
   ============================================================ */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:border-color 0.2s,transform 0.15s;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card-rank{position:absolute;top:-1px;right:-1px;font-size:10px;font-weight:800;padding:4px 10px;color:#fff;border-radius:0 12px 0 10px}
.rank-t0{background:#f85149}.rank-t05{background:#f0883e}.rank-t1{background:#d2991d;color:#000}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.card-icon{width:46px;height:46px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px}
.card-title{font-weight:700;font-size:16px}
.card-subtitle{font-size:12px;color:var(--muted)}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.card-tag{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--surface2);color:var(--muted)}
.card-tag.t0{background:rgba(248,81,73,0.15);color:var(--red);font-weight:600}
.card-tag.t05{background:rgba(240,136,62,0.15);color:var(--accent);font-weight:600}
.card-tag.t1{background:rgba(210,153,29,0.15);color:var(--gold);font-weight:600}
.card-tag.newbie{background:rgba(63,185,80,0.12);color:var(--green)}
.card-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:12px}
.card-info{display:flex;gap:14px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:12px}
.card-info span strong{color:var(--text);display:block;font-size:14px}

/* ============================================================
   Tier Table
   ============================================================ */
.tier-bar{display:flex;gap:2px;margin-bottom:24px;border-radius:10px;overflow:hidden}
.tier-item{flex:1;text-align:center;padding:8px 4px;font-size:12px;font-weight:700}
.tier-t0{background:#f85149;color:#fff}.tier-t05{background:#f0883e;color:#fff}
.tier-t1{background:#d2991d;color:#000}.tier-t2{background:#30363d;color:var(--muted)}
.tier-table-wrapper{overflow-x:auto}
.tier-table{width:100%;border-collapse:collapse;font-size:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tier-table thead{background:var(--surface2)}
.tier-table th{text-align:left;padding:11px 16px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.tier-table td{padding:10px 16px;border-top:1px solid var(--border)}
.tier-table tbody tr{cursor:pointer;transition:background 0.15s}
.tier-table tbody tr:hover{background:rgba(255,255,255,0.03)}
.tier-badge{display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;border-radius:6px;font-size:12px;font-weight:800}
.tier-badge.t0{background:#f85149;color:#fff}.tier-badge.t05{background:#f0883e;color:#fff}
.tier-badge.t1{background:#d2991d;color:#000}.tier-badge.t2{background:#30363d;color:var(--muted)}

/* ============================================================
   Operator Cards
   ============================================================ */
.op-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.op-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color 0.2s;display:flex;gap:14px}
.op-card:hover{border-color:var(--accent)}
.op-avatar{width:50px;height:50px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.op-avatar.assault{background:linear-gradient(135deg,#f85149,#b62324)}
.op-avatar.support{background:linear-gradient(135deg,#58a6ff,#1f6feb)}
.op-avatar.recon{background:linear-gradient(135deg,#3fb950,#1a7f2b)}
.op-avatar.engineer{background:linear-gradient(135deg,#d2991d,#9e6a0e)}
.op-info{flex:1;min-width:0}
.op-info h4{font-size:14px;font-weight:700;margin-bottom:2px}
.op-info .op-eng{font-size:11px;color:var(--muted);margin-bottom:4px}
.op-info .op-skill{font-size:12px;color:var(--muted);line-height:1.5}
.role-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:4px;letter-spacing:0.5px}
.role-badge.assault{background:rgba(248,81,73,0.15);color:var(--red)}
.role-badge.support{background:rgba(88,166,255,0.15);color:var(--blue)}
.role-badge.recon{background:rgba(63,185,80,0.15);color:var(--green)}
.role-badge.engineer{background:rgba(210,153,29,0.15);color:var(--gold)}

/* ============================================================
   Map Cards
   ============================================================ */
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.map-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color 0.2s}
.map-card:hover{border-color:var(--accent)}
.map-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:38px;position:relative}
.map-mode-badge{position:absolute;top:10px;left:10px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;color:#fff;letter-spacing:0.5px}
.mode-warfare{background:rgba(248,81,73,0.85)}.mode-ops{background:rgba(240,136,62,0.85)}
.map-body{padding:14px 16px}
.map-body h4{font-size:15px;font-weight:700;margin-bottom:4px}
.map-body p{font-size:12px;color:var(--muted)}
.map-body .map-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.map-body .map-meta span{font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:4px}

/* ============================================================
   Detail Page
   ============================================================ */
.detail-hero{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;margin-top:12px}
.detail-hero .dh-icon{width:72px;height:72px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;background:var(--surface2)}
.detail-meta h2{font-size:26px;font-weight:800;margin-bottom:4px}
.detail-meta .dm-sub{font-size:14px;color:var(--muted);margin-bottom:10px}
.detail-section{margin-bottom:28px}
.detail-section h3{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--accent);display:flex;align-items:center;gap:8px}
.detail-section h3::after{content:'';flex:1;height:1px;background:var(--border)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-box .stat-val{font-size:22px;font-weight:800;color:var(--text)}
.stat-box .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.build-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.build-card h4{font-size:15px;margin-bottom:6px}
.build-card .build-desc{font-size:13px;color:var(--muted);margin-bottom:10px}
.build-code{display:inline-flex;align-items:center;gap:8px;font-family:"SF Mono","Cascadia Code","Consolas",monospace;font-size:12px;background:var(--bg);padding:6px 12px;border-radius:6px;color:var(--teal);border:1px solid var(--border);cursor:pointer;transition:background 0.2s;word-break:break-all}
.build-code:hover{background:var(--surface2)}

/* ============================================================
   Guide Cards
   ============================================================ */
.guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.guide-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 18px;text-align:center;cursor:pointer;transition:all 0.2s}
.guide-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.guide-card.expanded{border-color:var(--accent);text-align:left}
.guide-icon{font-size:36px;margin-bottom:12px}
.guide-card h4{font-size:15px;margin-bottom:6px}
.guide-card .guide-preview{font-size:12px;color:var(--muted)}
.guide-card .guide-detail{display:none;margin-top:12px;font-size:13px;color:var(--muted);line-height:1.8}
.guide-card.expanded .guide-detail{display:block}
.guide-card.expanded .guide-preview{display:none}

/* ============================================================
   News / Toast / Back-top / Footer
   ============================================================ */
.news-list{display:flex;flex-direction:column;gap:4px}
.news-item{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surface);border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all 0.2s}
.news-item:hover{background:var(--surface2);border-color:var(--border)}
.news-date{font-size:11px;color:var(--muted);white-space:nowrap;background:var(--surface2);padding:4px 10px;border-radius:6px}
.news-tag{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600;white-space:nowrap}
.news-tag.update{background:rgba(88,166,255,0.12);color:var(--blue)}
.news-tag.event{background:rgba(240,136,62,0.12);color:var(--accent)}
.news-tag.guide{background:rgba(63,185,80,0.12);color:var(--green)}
.news-tag.balance{background:rgba(163,113,247,0.15);color:var(--purple)}
.news-tag.esports{background:rgba(248,81,73,0.12);color:var(--red)}
.news-tag.platform{background:rgba(88,166,255,0.12);color:var(--blue)}
.news-title{flex:1;font-size:14px;font-weight:500}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.back-top{position:fixed;bottom:30px;right:30px;width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:18px;cursor:pointer;z-index:998;opacity:0;transition:opacity 0.3s;box-shadow:0 4px 16px rgba(240,136,62,0.3)}
.back-top.visible{opacity:1}
.footer{border-top:1px solid var(--border);padding:28px 24px;text-align:center;color:var(--muted);font-size:13px}
.footer a{cursor:pointer;color:var(--text)}
.footer .disclaimer{font-size:11px;color:#484f58;margin-top:8px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}

/* ============================================================
   Responsive
   ============================================================ */
@media(max-width:768px){
  .nav-links{display:none}.hamburger{display:flex}
  .nav-search{width:120px}.nav-search:focus{width:150px}
  .hero h1{font-size:28px}.hero-search{width:100%}
  .hero-stats{gap:20px}.stat-num{font-size:22px}
  .card-grid{grid-template-columns:1fr}.op-grid{grid-template-columns:1fr}
  .map-grid{grid-template-columns:1fr}.detail-hero{flex-direction:column}
  .tier-table{font-size:12px}.tier-table th,.tier-table td{padding:8px 10px}
  .news-item{flex-wrap:wrap}.news-date{order:3}
  .search-dropdown{width:calc(100vw - 48px);right:-60px}
}
</style>
</head>

<script>

<script>
// ============================
// Router
// ============================
var currentRoute='';
function navigate(path){window.location.hash='#'+path}
function getRoute(){var h=window.location.hash.replace('#','')||'/';return h.startsWith('/')?h:'/'+h}
function parseRoute(route){var p=route.replace(/^\/+|\/+$/g,'').split('/');return{page:p[0]||'home',id:p[1]||null}}

// ============================
// Search
// ============================
function fuzzyMatch(text,query){text=text.toLowerCase();query=query.toLowerCase();for(var i=0,qi=0;i<text.length&&qi<query.length;i++)if(text[i]===query[qi])qi++;return qi===query.length}
function highlightMatch(text,query){if(!query)return text;var re=new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return text.replace(re,'<mark>$1</mark>')}
function searchAll(query){if(!query||query.length<1)return[];var r=[];DB.weapons.forEach(function(w){var s=[w.name,w.type,w.tier,w.desc].concat(w.tags.map(function(t){return t.t})).join(' ');if(fuzzyMatch(s,query))r.push({type:'weapon',typeLabel:'武器',id:w.id,name:w.name,meta:w.type+' · '+w.tier,icon:w.icon,url:'/weapon/'+w.id})});DB.operators.forEach(function(o){var s=[o.name,o.eng,o.real,o.clsLabel,o.skill,o.skillDesc].join(' ');if(fuzzyMatch(s,query))r.push({type:'operator',typeLabel:'干员',id:o.id,name:o.name+' · '+o.eng,meta:o.clsLabel+' · '+o.skill,icon:o.icon,url:'/operator/'+o.id})});DB.maps.forEach(function(m){var s=[m.name,m.eng,m.modeLabel,m.desc].join(' ');if(fuzzyMatch(s,query))r.push({type:'map',typeLabel:'地图',id:m.id,name:m.name+' · '+m.eng,meta:m.modeLabel+' · '+m.style,icon:m.icon,url:'/map/'+m.id})});return r.slice(0,12)}

var searchInput=document.getElementById('globalSearch');
var searchDropdown=document.getElementById('searchDropdown');
var searchTimer;
searchInput.addEventListener('input',function(){clearTimeout(searchTimer);var q=this.value.trim();searchTimer=setTimeout(function(){renderSearchDropdown(searchAll(q),q)},150)});
searchInput.addEventListener('focus',function(){if(this.value.trim())renderSearchDropdown(searchAll(this.value.trim()),this.value.trim())});
document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap'))searchDropdown.classList.remove('visible')});
document.addEventListener('keydown',function(e){if(e.key==='Escape')searchDropdown.classList.remove('visible')});

function renderSearchDropdown(results,query){
  if(results.length===0){searchDropdown.innerHTML='<div class="sd-empty">未找到匹配结果</div>';searchDropdown.classList.add('visible');return}
  searchDropdown.innerHTML=results.map(function(r){return'<div class="sd-item" onclick="navigate(\''+r.url+'\');searchDropdown.classList.remove(\'visible\');searchInput.value=\'\'"><span class="sd-icon">'+r.icon+'</span><div><div class="sd-name">'+highlightMatch(r.name,query)+'</div><div class="sd-meta">'+r.typeLabel+'· '+r.meta+'</div></div></div>'}).join('');
  searchDropdown.classList.add('visible');
}

// Hero search
function handleHeroSearch(query){
  var dd=document.getElementById('heroSearchDropdown');if(!dd)return;
  var results=searchAll(query);
  if(query.length<1){dd.classList.remove('visible');return}
  if(results.length===0){dd.innerHTML='<div class="sd-empty">未找到匹配结果，试试 "K416" 或 "红狼"</div>';dd.classList.add('visible');return}
  dd.innerHTML=results.map(function(r){return'<div class="sd-item" onclick="navigate(\''+r.url+'\');dd.classList.remove(\'visible\')"><span class="sd-icon">'+r.icon+'</span><div><div class="sd-name">'+highlightMatch(r.name,query)+'</div><div class="sd-meta">'+r.typeLabel+'· '+r.meta+'</div></div></div>'}).join('');
  dd.classList.add('visible');
}

// ============================
// Toast & Back-to-top
// ============================
var toastTimer;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show')},2000)}
function copyCode(code){navigator.clipboard.writeText(code).then(function(){showToast('✓ 改枪码已复制！可在游戏内导入')})['catch'](function(){showToast('复制失败，请手动复制')})}
window.addEventListener('scroll',function(){document.getElementById('backTop').classList.toggle('visible',window.scrollY>400)});

// ============================
// Mobile Menu
// ============================
document.getElementById('hamburgerBtn').addEventListener('click',function(){document.getElementById('mobileMenu').classList.toggle('visible')});
function closeMobileMenu(){document.getElementById('mobileMenu').classList.remove('visible')}

// ============================
// Breadcrumb
// ============================
function renderBreadcrumb(crumbs){
  return'<div class="breadcrumb">'+crumbs.map(function(c,i){if(i===crumbs.length-1)return'<span>'+c.label+'</span>';return'<a onclick="navigate(\''+c.url+'\')">'+c.label+'</a><span class="sep">/</span>'}).join('')+'</div>';
}

// ============================
// Filter Bar
// ============================
function renderFilterBar(filters,active){
  return'<div class="filter-bar">'+filters.map(function(f){return'<button class="filter-btn'+(f.key===active?' active':'')+'" onclick="'+f.action+'">'+f.label+'</button>'}).join('')+'</div>';
}

// ============================
// Card Components
// ============================
function renderWeaponCard(w){
  var tagsHtml=w.tags.map(function(t){return'<span class="card-tag '+(t.c||'')+'">'+t.t+'</span>'}).join('');
  return'<div class="card" onclick="navigate(\'/weapon/'+w.id+'\')"><span class="card-rank rank-'+w.tier.replace('.','').toLowerCase()+'">'+w.tier+'</span><div class="card-header"><div class="card-icon">'+w.icon+'</div><div><div class="card-title">'+w.name+'</div><div class="card-subtitle">'+w.range+'· '+w.type+'</div></div></div><div class="card-tags">'+tagsHtml+'</div><p class="card-desc">'+w.desc+'</p><div class="card-info"><span><strong>'+w.stats.overall+'</strong>综合评级</span><span><strong>'+w.difficulty+'</strong>上手难度</span><span><strong>'+w.mode+'</strong>适用场景</span></div></div>';
}

function renderOperatorCard(o){
  return'<div class="op-card" onclick="navigate(\'/operator/'+o.id+'\')"><div class="op-avatar '+o.cls+'">'+o.icon+'</div><div class="op-info"><span class="role-badge '+o.cls+'">'+o.clsLabel+'</span><h4>'+o.name+' <span style="font-weight:400;font-size:11px;color:var(--muted)">'+o.eng+'</span></h4><div class="op-eng">'+o.real.split(' ').slice(-1)[0]+'</div><div class="op-skill"><strong>'+o.skill+'</strong>：'+o.skillDesc.slice(0,50)+'…</div></div></div>';
}

function renderMapCard(m){
  var diffs=m.difficulty.filter(function(d){return d!=='-'}).map(function(d){return'<span>'+d+'</span>'}).join('');
  var darkColor=m.color?m.color.replace(/4/g,'1').replace(/3/g,'1').replace(/2/g,'1'):'#0d1117';
  return'<div class="map-card" onclick="navigate(\'/map/'+m.id+'\')"><div class="map-thumb" style="background:linear-gradient(135deg,'+(m.color||'#1c2333')+','+darkColor+')"><span class="map-mode-badge '+(m.mode==='warfare'?'mode-warfare':'mode-ops')+'">'+m.modeLabel+'</span>'+m.icon+'</div><div class="map-body"><h4>'+m.name+' <span style="font-weight:400;font-size:11px;color:var(--muted)">'+m.eng+'</span></h4><p>'+m.desc+'</p><div class="map-meta">'+diffs+'<span>'+m.style+'</span></div></div></div>';
}

// ============================
// PAGE RENDERERS
// ============================

function renderHome(){
  var featured=DB.weapons.filter(function(w){return['T0','T0.5'].indexOf(w.tier)>=0}).slice(0,4);
  var latest=DB.news.slice(0,4);
  return'<div class="page"><section class="hero"><div class="hero-badge"><span class="dot"></span> S9 「回响」赛季 · 进行中</div><h1>三角洲行动<span>攻略站</span></h1><p>全武器天梯排行 · 烽火改枪方案 · 干员技能详解 · 地图撤离点位<br>由玩家社区维护的三角洲行动中文攻略百科</p><div class="hero-search"><input type="text" placeholder="搜索武器配装、地图攻略、干员技能…" id="heroSearchInput" oninput="handleHeroSearch(this.value)" onfocus="handleHeroSearch(this.value)" /><button onclick="document.getElementById(\'heroSearchInput\').focus()">搜索</button><div class="search-dropdown" id="heroSearchDropdown"></div></div><div class="hero-stats"><div class="stat-item"><div class="stat-num">14</div><div class="stat-label">武器配装方案</div></div><div class="stat-item"><div class="stat-num">15</div><div class="stat-label">全干员图鉴</div></div><div class="stat-item"><div class="stat-num">8</div><div class="stat-label">地图攻略</div></div><div class="stat-item"><div class="stat-num">2</div><div class="stat-label">核心模式</div></div></div></section><div class="container"><section class="section"><div class="section-header"><h2>武器<span>天梯速览</span></h2><span class="more" onclick="navigate(\'/weapons\')">查看全部 →</span></div><div class="tier-bar"><div class="tier-item tier-t0">T0 · 版本答案</div><div class="tier-item tier-t05">T0.5 · 强势备选</div><div class="tier-item tier-t1">T1 · 稳健可靠</div><div class="tier-item tier-t2">T2 · 过渡经济</div></div><div class="card-grid">'+featured.map(renderWeaponCard).join('')+'</div></section><section class="section"><div class="section-header"><h2>最新<span>资讯</span></h2><span class="more" onclick="navigate(\'/news\')">更多资讯 →</span></div><div class="news-list">'+latest.map(function(n){return'<div class="news-item" onclick="navigate(\'/news\')"><span class="news-tag '+n.tag+'">'+n.tagLabel+'</span><span class="news-title">'+n.title+'</span><span class="news-date">'+n.date+'</span></div>'}).join('')+'</div></section><section class="section"><div class="section-header"><h2>快速<span>入口</span></h2></div><div class="guide-grid"><div class="guide-card" onclick="navigate(\'/weapons\')"><div class="guide-icon">🎯</div><h4>武器配装</h4><p class="guide-preview">14把武器完整配装方案</p></div><div class="guide-card" onclick="navigate(\'/operators\')"><div class="guide-icon">👤</div><h4>干员图鉴</h4><p class="guide-preview">15位干员技能详解</p></div><div class="guide-card" onclick="navigate(\'/maps\')"><div class="guide-icon">🗺️</div><h4>地图攻略</h4><p class="guide-preview">8张地图点位解析</p></div><div class="guide-card" onclick="navigate(\'/guide\')"><div class="guide-icon">📖</div><h4>新手指南</h4><p class="guide-preview">从零开始上手三角洲</p></div></div></section></div></div>';
}

var weaponFilter='all';
function renderWeapons(){
  var types=['all','战斗步枪','突击步枪','冲锋枪','射手步枪','轻机枪'];
  var labels=['全部','战斗步枪','突击步枪','冲锋枪','射手步枪','轻机枪'];
  var filtered=weaponFilter==='all'?DB.weapons:DB.weapons.filter(function(w){return w.type===weaponFilter});
  return'<div class="page"><div class="container">'+renderBreadcrumb([{label:'首页',url:'/'},{label:'武器配装'}])+'<div class="section-header"><h2>全部<span>武器配装</span></h2><span style="font-size:13px;color:var(--muted)">共 '+filtered.length+' 把</span></div>'+renderFilterBar(types.map(function(t,i){return{key:t,label:labels[i],action:"setWeaponFilter('"+t+"')"}}),weaponFilter)+'<div class="card-grid">'+filtered.map(renderWeaponCard).join('')+'</div>'+(filtered.length===0?'<div class="empty-state"><p>没有匹配的武器</p></div>':'')+'</div></div>';
}
function setWeaponFilter(type){weaponFilter=type;render();window.scrollTo({top:200,behavior:'smooth'})}

function renderWeaponDetail(id){
  var w=DB.weapons.find(function(w){return w.id===id});
  if(!w)return'<div class="empty-state"><p>武器未找到</p></div>';
  return'<div class="page"><div class="container">'+renderBreadcrumb([{label:'首页',url:'/'},{label:'武器配装',url:'/weapons'},{label:w.name}])+'<div class="detail-hero"><div class="dh-icon">'+w.icon+'</div><div class="detail-meta" style="flex:1"><h2>'+w.name+'</h2><div class="dm-sub">'+w.type+'· 梯队 '+w.tier+'· '+w.range+'</div><div class="card-tags" style="margin-bottom:0">'+w.tags.map(function(t){return'<span class="card-tag '+(t.c||'')+'">'+t.t+'</span>'}).join('')+'</div></div></div><div class="detail-section"><h3>属性面板</h3><div class="stat-grid"><div class="stat-box"><div class="stat-val">'+w.damage+'</div><div class="stat-lbl">单发伤害</div></div><div class="stat-box"><div class="stat-val">'+w.rpm+'</div><div class="stat-lbl">射速 RPM</div></div><div class="stat-box"><div class="stat-val">'+w.stats.overall+'</div><div class="stat-lbl">综合评级</div></div><div class="stat-box"><div class="stat-val">'+w.difficulty+'</div><div class="stat-lbl">上手难度</div></div><div class="stat-box"><div class="stat-val">'+w.cost+'</div><div class="stat-lbl">满配造价</div></div><div class="stat-box"><div class="stat-val">'+w.mode+'</div><div class="stat-lbl">适用场景</div></div></div></div><div class="detail-section"><h3>距离评级</h3><div class="stat-grid"><div class="stat-box"><div class="stat-val">'+w.stats.overall+'</div><div class="stat-lbl">综合</div></div><div class="stat-box"><div class="stat-val">'+w.stats.close+'</div><div class="stat-lbl">近距离</div></div><div class="stat-box"><div class="stat-val">'+w.stats.mid+'</div><div class="stat-lbl">中距离</div></div><div class="stat-box"><div class="stat-val">'+w.stats.long+'</div><div class="stat-lbl">远距离</div></div></div></div><div class="detail-section"><h3>武器简介</h3><p style="color:var(--muted);line-height:1.8">'+w.desc+'</p></div><div class="detail-section"><h3>配装方案</h3>'+w.builds.map(function(b){return'<div class="build-card"><h4>'+b.name+'</h4><p class="build-desc">'+b.desc+'</p><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">'+b.atts.map(function(a){return'<span style="font-size:11px;padding:3px 10px;background:var(--surface2);border-radius:12px;color:var(--muted)">'+a+'</span>'}).join('')+'</div><div class="build-code" onclick="copyCode(\''+b.code+'\')" title="点击复制改枪码">🔑 '+b.code+' <span style="color:var(--muted)">📋</span></div></div>'}).join('')+'</div></div></div>';
}

var operatorFilter='all';
function renderOperators(){

function setOperatorFilter(type){operatorFilter=type;render();window.scrollTo({top:200,behavior:'smooth'})}

var mapFilter='all';
function renderMaps(){
  var modes=[{key:'all',label:'全部'},{key:'ops',label:'🎒 烽火地带'},{key:'warfare',label:'⚔️ 全面战场'}];
  var filtered=mapFilter==='all'?DB.maps:DB.maps.filter(function(m){return m.mode===mapFilter});
  return'<div class="page"><div class="container">'+renderBreadcrumb([{label:'首页',url:'/'},{label:'地图点位'}])+'<div class="section-header"><h2>地图<span>点位速览</span></h2><span style="font-size:13px;color:var(--muted)">共 '+DB.maps.length+' 张 · 显示 '+filtered.length+' 张</span></div>'+renderFilterBar(modes,mapFilter)+'<div class="map-grid">'+filtered.map(renderMapCard).join('')+'</div></div></div>';

function setMapFilter(type){mapFilter=type;render();window.scrollTo({top:200,behavior:'smooth'})}

function renderMapDetail(id){
  var m=DB.maps.find(function(m){return m.id===id});
  if(!m)return'<div class="empty-state"><p>地图未找到</p></div>';

// ============================
// Guide
// ============================
var expandedGuide=null;
function renderGuide(){
  return'<div class="page"><div class="container">'+renderBreadcrumb([{label:'首页',url:'/'},{label:'新手指南'}])+'<div class="section-header"><h2>新手<span>快速上手</span></h2></div><div class="guide-grid">'+DB.guides.map(function(g,i){return'<div class="guide-card'+(expandedGuide===i?' expanded':'')+'" onclick="toggleGuide('+i+')"><div class="guide-icon">'+g.icon+'</div><h4>'+g.title+'</h4><p class="guide-preview">'+g.preview+'</p><div class="guide-detail">'+g.detail+'</div><div style="font-size:12px;color:var(--accent);margin-top:8px">'+(expandedGuide===i?'点击收起 ▲':'点击展开 ▼')+'</div></div>'}).join('')+'</div></div></div>';
}
function toggleGuide(index){expandedGuide=expandedGuide===index?null:index;render()}

// ============================
// News
// ============================
var newsFilter='all';
function renderNews(){
  var tags=[{key:'all',label:'全部'},{key:'update',label:'赛季更新'},{key:'balance',label:'平衡调整'},{key:'event',label:'联动活动'},{key:'guide',label:'配装攻略'},{key:'esports',label:'电竞赛事'},{key:'platform',label:'平台更新'}];
  var filtered=newsFilter==='all'?DB.news:DB.news.filter(function(n){return n.tag===newsFilter});
  return'<div class="page"><div class="container">'+renderBreadcrumb([{label:'首页',url:'/'},{label:'版本资讯'}])+'<div class="section-header"><h2>版本<span>资讯</span></h2><span style="font-size:13px;color:var(--muted)">共 '+DB.news.length+' 条</span></div>'+renderFilterBar(tags,newsFilter)+'<div class="news-list">'+filtered.map(function(n){return'<div class="news-item"><span class="news-tag '+n.tag+'">'+n.tagLabel+'</span><span class="news-title">'+n.title+'</span><span class="news-date">'+n.date+'</span></div>'}).join('')+'</div>'+(filtered.length===0?'<div class="empty-state"><p>暂无此类资讯</p></div>':'')+'</div></div>';
}
function setNewsFilter(type){newsFilter=type;render();window.scrollTo({top:200,behavior:'smooth'})}

// ============================
// Main Render
// ============================
function render(){
  var route=getRoute();if(route===currentRoute)return;currentRoute=route;
  var parsed=parseRoute(route),page=parsed.page,id=parsed.id;
  var app=document.getElementById('app'),html='';

  // Update nav active
  document.querySelectorAll('.nav-links a').forEach(function(a){a.classList.remove('active')});
  var pageToNav={weapons:'weapons',weapon:'weapons',operators:'operators',operator:'operators',maps:'maps',map:'maps',guide:'guide',news:'news'};
  var navKey=pageToNav[page];
  if(navKey){
    var navTexts={weapons:'武器配装',operators:'干员图鉴',maps:'地图点位',guide:'新手指南',news:'版本资讯'};
    document.querySelectorAll('.nav-links a').forEach(function(a){if(a.textContent.trim()===navTexts[navKey])a.classList.add('active')});
  }

  switch(page){
    case'home':html=renderHome();break;
    case'weapons':html=renderWeapons();break;
    case'weapon':html=renderWeaponDetail(id);break;
    case'operators':html=renderOperators();break;
    case'operator':html=renderOperatorDetail(id);break;
    case'maps':html=renderMaps();break;
    case'map':html=renderMapDetail(id);break;
    case'guide':html=renderGuide();break;
    case'news':html=renderNews();break;
    default:html=renderHome();
  }
  app.innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
}

window.addEventListener('hashchange',render);
render();
console.log('三角洲行动攻略站 SPA 已就绪');
console.log('路由: #/ | #/weapons | #/weapon/m7 | #/operators | #/operator/d-wolf | #/maps | #/map/zero-dam | #/guide | #/news');
</script>
